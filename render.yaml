# Render.com デプロイ設定
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: seo-second-opinion
    runtime: python
    plan: starter  # 商用利用 ($7/月)。sleep なし & 永続ビルドキャッシュ
    # uv (Rust製の高速 pip 代替) を python -m 経由で呼び出し PATH 依存を回避
    buildCommand: pip install uv && python -m uv pip install --system -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: ANTHROPIC_API_KEY
        sync: false  # Render ダッシュボードで個別に設定 (機密のため)
      - key: ANTHROPIC_MODEL
        sync: false  # ダッシュボードで管理 (Blueprint再評価時に上書きされないようにするため)
      - key: AHREFS_API_TOKEN
        sync: false
      - key: APP_MODE
        sync: false  # ダッシュボードで管理 (live/mock 切替を YAML 上書きから保護)
      # ─── 管理者専用ログ閲覧機能 ───
      - key: ADMIN_PASSWORD
        sync: false  # Render ダッシュボードで個別設定 (機密)
      - key: ADMIN_URL_KEY
        value: secretkey-bw  # URL ?admin=<この値> でログイン画面が出現
      - key: DATABASE_URL
        sync: false  # Neon Postgres の接続URL (psql://...) を Render ダッシュボードで設定
